<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- 外圈渐变圆环 -->
  <circle cx="50" cy="50" r="45" stroke="url(#g1)" stroke-width="2" opacity="0.6" />
  <circle cx="50" cy="50" r="38" stroke="url(#g2)" stroke-width="1.5" opacity="0.4" />
  <!-- 中心节点 -->
  <circle cx="50" cy="50" r="12" fill="url(#g1)" />
  <!-- 三个环绕节点 -->
  <circle cx="50" cy="25" r="6" fill="url(#g2)" />
  <circle cx="71.65" cy="62.5" r="6" fill="url(#g2)" />
  <circle cx="28.35" cy="62.5" r="6" fill="url(#g2)" />
  <!-- 连接线 -->
  <line x1="50" y1="38" x2="50" y2="31" stroke="url(#g3)" stroke-width="2" stroke-linecap="round" />
  <line x1="56.93" y1="57.5" x2="65.65" y2="62.5" stroke="url(#g3)" stroke-width="2" stroke-linecap="round" />
  <line x1="43.07" y1="57.5" x2="34.35" y2="62.5" stroke="url(#g3)" stroke-width="2" stroke-linecap="round" />
</svg>
