version: "3.9"

services:
  backend:
    build: ./backend-fastapi
    container_name: ragsystem-backend
    env_file:
      - ./backend-fastapi/.env
    environment:
      RAG_DATA_ROOT: /data
    volumes:
      - ./docker-data:/data
    ports:
      - "5001:5001"
    restart: unless-stopped

  frontend:
    build: ./frontend-client
    container_name: ragsystem-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
