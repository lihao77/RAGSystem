version: 1

# Default settings for all hooks
defaults:
  enabled: true
  timeout_ms: 1000
  fail_mode: closed_for_decision_open_for_observation
  broadcast: true

# Workspace trust configuration
# rules 由运行时根据 DATA_ROOT / RAG_DATA_ROOT 动态注入，此处不硬编码路径
workspace_trust:
  default: trusted
  rules: []

# System-level hook definitions
hooks:
  # High-risk tool audit hook
  - id: tool-risk-audit
    name: "High-Risk Tool Audit"
    description: "Audit all high-risk tool executions for security and compliance"
    enabled: true
    source: system
    priority: 100
    events:
      - tool.after_execute
    matcher:
      tool_names:
        - execute_bash
        - write_memory
        - edit_file
        - write_file
      callers:
        - direct
    backend:
      type: function
      target: "hooks.builtin.tool_hooks:handle_risk_audit"
    ui:
      title: "高风险工具审计"
      description: "记录高风险工具的执行情况"
      show_progress: false

  # Approval enhancement hook
  - id: approval-ui-enhancement
    name: "Approval UI Enhancement"
    description: "Enhance approval prompts with additional context and warnings"
    enabled: true
    source: system
    priority: 200
    events:
      - approval.required
    matcher:
      risk_levels:
        - high
        - critical
    backend:
      type: function
      target: "hooks.builtin.tool_hooks:handle_high_risk_approval_enhancement"
    ui:
      title: "审批提示增强"
      description: "为高风险操作添加额外的警告信息"

  # Bash command validation hook
  # 注意：绑定 tool.before_permission 而非 tool.before_execute，
  # 确保安全规则检查先于权限决策执行，防止命令注入在权限层被绕过。
  - id: bash-command-validation
    name: "Bash Command Validation"
    description: "Validate bash commands for dangerous patterns"
    enabled: true
    source: system
    priority: 300
    events:
      - tool.before_permission
    matcher:
      tool_names:
        - execute_bash
    backend:
      type: function
      target: "hooks.builtin.tool_hooks:handle_bash_command_validation"
    fail_open: false
    ui:
      title: "Bash 命令校验"
      description: "检查危险的 bash 命令模式"

  # Memory write guard hook
  - id: memory-write-guard
    name: "Memory Write Guard"
    description: "Add context about memory write operations"
    enabled: true
    source: system
    priority: 150
    events:
      - tool.before_execute
    matcher:
      tool_names:
        - write_memory
    backend:
      type: function
      target: "hooks.builtin.tool_hooks:handle_memory_write_guard"
    ui:
      title: "记忆写入守护"
      description: "为记忆写入操作添加上下文信息"

  # Chart agent bypass example (disabled by default)
  - id: chart-agent-bypass
    name: "Chart Agent Bypass"
    description: "Skip certain hooks for chart_agent"
    enabled: false
    source: system
    priority: 50
    events:
      - tool.before_permission
    if: "context.current_agent_name != 'chart_agent'"
    matcher:
      tool_names:
        - create_chart
        - create_map
    backend:
      type: callback
      target: "noop"
    ui:
      title: "图表 Agent 绕过"
      description: "chart_agent 执行可视化工具时跳过某些检查"

  # ========== 测试用 Hook ==========

  # Test hook: Log all tool executions
  - id: test-tool-logger
    name: "测试工具日志记录器"
    description: "记录所有工具执行（用于测试 Hook 系统）"
    enabled: true
    source: system
    priority: 50
    events:
      - tool.before_execute
      - tool.after_execute
    matcher:
      # 匹配所有工具（不指定 tool_names）
      callers:
        - direct
    backend:
      type: function
      target: "hooks.builtin.tool_hooks:handle_test_logger"
    ui:
      title: "🔍 测试工具日志"
      description: "记录工具执行用于测试"

  # Test hook: Add context to read_file
  - id: test-read-file-enhancer
    name: "测试文件读取增强器"
    description: "为 read_file 工具添加额外上下文"
    enabled: true
    source: system
    priority: 100
    events:
      - tool.before_execute
    matcher:
      tool_names:
        - read_file
    backend:
      type: prompt
      target: "test_prompt"
      config:
        prompt: "📖 提示：正在读取文件 {tool_name}，请注意文件内容可能很大"
    ui:
      title: "📖 文件读取提示"
      description: "提醒 AI 注意文件大小"

